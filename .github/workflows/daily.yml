name: Daily WHOIS Watcher

on:
  schedule:
    # Run once every 4 hours
    - cron: '0 */4 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject SMTP credentials into config.json
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          jq \
            --arg user "$SMTP_USER" \
            --arg pass "$SMTP_PASS" \
            '.email.smtp_user = $user | .email.smtp_pass = $pass' \
            config.json > config.tmp.json
          mv config.tmp.json config.json

      - name: Create output directories
        run: mkdir -p snapshots archives reports logs

      - name: Run WHOIS watcher
        id: watcher
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          node src/run.js $DATE_ARG

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        if: always()
        with:
          commit_message: "[watcher] sync data ${{ github.run_id }}"
          file_pattern: 'ledger.json last_run.json reports snapshots snapshots/* archives archives/* logs/latest.log'
          # Force add if hidden by .gitignore
          add_options: '--force'
          push_options: '--force'
          skip_dirty_check: false
          # Explicitly provide the token for push permissions
          repository: .
          branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
